# CheatChecker Configuration by morskoi den
# Placeholders: {PLAYER} - player name, {STAFF} - staff member name, {WORLD} - world name

# Messages

# Message sent to player when check start
start-check: "You have been called for a cheat check. Follow the instructions of moderator §6{STAFF}"

# Message sent to player when check ends successfully
stop-check: "§aYou have successfully passed the check. You can continue playing."

# Message sent to staff when check starts
staff-message-start: "§aYou started checking player §e{PLAYER}"

# Message sent to staff when check stops
stop-check-moder: "§aYou stopped checking player §e{PLAYER}"

# Message checklist format
format-list-checks: "§aCurrent Active Checks:\n§f- §cstaff §f- §eplayer §f- §6date\n §f| §c{STAFF} §f| §e{PLAYER} §f| §6{DATE} §f|"

# Message when player argument is missing
player-null: "§cSpecify player name: §e/check <start|stop> <player>"

# Message when target player is offline
player-offline: "§cPlayer §e{PLAYER} §cis offline"

# Message when player is already being checked
player-in-check: "§cPlayer §e{PLAYER} §cis already being checked"

# Message when player is NOT being checked
not-in-check: "§cPlayer §e{PLAYER} §cis not being checked"

# Message when staff tries to check themselves
self-check-start: "§cYou cannot call yourself for a check"

# Message when staff tries to stop check on themselves
self-check-stop: "§cYou cannot remove yourself from the check"

# Message when player tries to use commands during check
command-no-usage: "§cYou cannot use commands during the check!"

# Message shown in /check without arguments
command-use: "§cUsage: §e/check start <player> or /check stop <player>"

# Error when teleport world not found
error-world: "§cWorld §a{WORLD} §cnot found!"

# Title settings

# Title and subtitle text shown to player during check (big text in center of screen)
title-enable: "on" # enable title, if player in the check ? on = yes, off = no
title-text: "§cYOU ARE BEING CHECKED"
subtitle-text: "§aLOOK IN THE CHAT"

# Chat settings
special-chat-enable: "on" # is a special chat needed when a player is being verified? on = yes, off = no
chat-format: "§f[§cChatCheck§f] §f{PLAYER} -> {MESSAGE}"

# Teleport settings
teleport-enable: "on" # should I teleport player, at the start check ? on = yes, off = no

# Teleport commands messages:
not-checking-player: "§cYou are not checking player §e{PLAYER}!" # Message when the staff member is not the one inspecting the target player
success-teleport: "You have §asuccessfully teleported §fto the player you are checking" # Message after a successful teleport to the player being checked.

# Check settings
# Coordinates where player will be teleported during check
teleport-pos:
  world: "world"  # World name
  x: 0            # X coordinate
  y: 100          # Y coordinate
  z: 0            # Z coordinate

# Title interval in seconds (how often to show title)
title-interval: 10